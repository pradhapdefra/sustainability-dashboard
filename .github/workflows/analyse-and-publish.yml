
name: Sustainability Analysis

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"   # optional nightly run

jobs:
  analyse:
    runs-on: ubuntu-latest

    steps:
      # -------------------------------------------------
      # Checkout DASHBOARD repo (self)
      # -------------------------------------------------
      - name: Checkout dashboard
        uses: actions/checkout@v4

      # -------------------------------------------------
      # Checkout SOURCE repo to analyse
      # (matches ADO 'sourceRepo')
      # -------------------------------------------------
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          repository: DEFRA/service-manual-ui
          path: service-manual-ui

      # -------------------------------------------------
      # Clone ANALYSER repo (ADO 'sustainabilityAnalyzer')
      # Manual clone to avoid checkout API issues
      # -------------------------------------------------
      - name: Clone sustainability analyser
        run: |
          git clone https://x-access-token:${{ secrets.ANALYZER_REPO_TOKEN }}@github.com/pradhapdefra/sustainability-analyzer.git sps.sustainability.analyzer

      # -------------------------------------------------
      # Setup Python (matches ADO)
      # -------------------------------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # -------------------------------------------------
      # Run sustainability analysis
      # (1:1 with your working ADO command)
      # -------------------------------------------------
      - name: Run analyser
        run: |
          python sps.sustainability.analyzer/analyzer/runner.py \
            --path service-manual-ui \
            --output root.json

      # -------------------------------------------------
      # Publish results into DASHBOARD repo
      # (same logic as ADO)
      # -------------------------------------------------
      - name: Publish sustainability results
        run: |
          set -e

          PROJECT="service-manual-ui"
          DATE="$(date +%Y-%m-%d)"

          TARGET_DIR="data/$PROJECT"
          TARGET_FILE="$TARGET_DIR/$DATE.json"
          INDEX_FILE="$TARGET_DIR/index.json"

          mkdir -p "$TARGET_DIR"

          cp root.json "$TARGET_FILE"
          cp "$TARGET_FILE" "$TARGET_DIR/latest.json"

          if [ ! -f "$INDEX_FILE" ]; then
            echo "[]" > "$INDEX_FILE"
          fi

          if ! jq -e --arg f "$DATE.json" '.[] | select(. == $f)' "$INDEX_FILE" >/dev/null; then
            jq --arg f "$DATE.json" '. + [$f]' "$INDEX_FILE" > "$INDEX_FILE.tmp"
            mv "$INDEX_FILE.tmp" "$INDEX_FILE"
          fi

      # -------------------------------------------------
      # Commit results (dashboard repo = Pages source)
      # -------------------------------------------------
      - name: Commit results
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/
          git commit -m "Sustainability update: service-manual-ui $DATE" || echo "No changes"
          git push
