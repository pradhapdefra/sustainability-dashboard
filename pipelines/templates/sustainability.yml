
name: Sustainability Analysis

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"   # optional

jobs:
  analyse:
    runs-on: ubuntu-latest

    steps:
      # -------------------------------------------------
      # Checkout DASHBOARD repo (this repo)
      # -------------------------------------------------
      - name: Checkout dashboard
        uses: actions/checkout@v4

      # -------------------------------------------------
      # Checkout SOURCE repo to analyse
      # -------------------------------------------------
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          repository: DEFRA/service-manual-ui
          path: source

      # -------------------------------------------------
      # Clone ANALYSER repo manually using PAT
      # -------------------------------------------------
      - name: Clone sustainability analyser (private)
        run: |
          git clone https://x-access-token:${{ secrets.ANALYZER_REPO_TOKEN }}@github.com/pradhapdefra/sustainability-analyzer.git analyzer

      # -------------------------------------------------
      # Setup Python
      # -------------------------------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # -------------------------------------------------
      # Run sustainability analysis
      # -------------------------------------------------
      - name: Run analyser
        run: |
          pip install -r analyzer/requirements.txt
          python analyzer/analyzer/runner.py \
            --path source \
            --output result.json

      # -------------------------------------------------
      # Publish results into dashboard data folder
      # -------------------------------------------------
      - name: Update dashboard data
        run: |
          PROJECT="service-manual-ui"
          DATE="$(date +%Y-%m-%d)"

          TARGET_DIR="data/$PROJECT"
          mkdir -p "$TARGET_DIR"

          cp result.json "$TARGET_DIR/$DATE.json"
          cp "$TARGET_DIR/$DATE.json" "$TARGET_DIR/latest.json"

          if [ ! -f "$TARGET_DIR/index.json" ]; then
            echo "[]" > "$TARGET_DIR/index.json"
          fi

          if ! jq -e --arg f "$DATE.json" '.[] | select(. == $f)' "$TARGET_DIR/index.json" >/dev/null; then
            jq --arg f "$DATE.json" '. + [$f]' "$TARGET_DIR/index.json" > "$TARGET_DIR/index.tmp"
            mv "$TARGET_DIR/index.tmp" "$TARGET_DIR/index.json"
          fi

      # -------------------------------------------------
      # Commit results back to dashboard repo
      # -------------------------------------------------
      - name: Commit results
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/
          git commit -m "Sustainability update: service-manual-ui $DATE" || echo "No changes"
          git push
